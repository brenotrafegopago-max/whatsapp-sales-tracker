<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CRM — WhatsApp</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0b141a; color: #e9edef; overflow: hidden; }

.app { display: flex; height: 100vh; }

/* ── Sidebar ── */
.sidebar { width: 360px; min-width: 280px; background: #111b21; border-right: 1px solid #222d34; display: flex; flex-direction: column; }
.sidebar-header { padding: 0.85rem 1rem; border-bottom: 1px solid #222d34; display: flex; align-items: center; justify-content: space-between; }
.sidebar-header h1 { font-size: 1rem; font-weight: 600; }
.sidebar-header a { color: #8696a0; font-size: 0.78rem; text-decoration: none; }
.sidebar-header a:hover { color: #e9edef; }

.search-box { padding: 0.5rem 0.75rem; }
.search-box input { width: 100%; background: #202c33; border: none; color: #e9edef; padding: 0.45rem 0.85rem; border-radius: 8px; font-size: 0.85rem; outline: none; }
.search-box input::placeholder { color: #8696a0; }

/* Filtros de status */
.status-filters { display: flex; gap: 0; border-bottom: 1px solid #222d34; overflow-x: auto; }
.status-filters::-webkit-scrollbar { display: none; }
.sf-btn { flex: 1; background: none; border: none; color: #8696a0; font-size: 0.72rem; padding: 0.55rem 0.3rem; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.15s; min-width: 60px; }
.sf-btn:hover { color: #e9edef; }
.sf-btn.active { color: #00a884; border-bottom-color: #00a884; font-weight: 600; }
.sf-badge { display: inline-block; background: #2a3942; border-radius: 99px; padding: 0 5px; font-size: 0.65rem; margin-left: 3px; min-width: 16px; text-align: center; }
.sf-btn.active .sf-badge { background: #00a884; color: #000; }

.conv-list { flex: 1; overflow-y: auto; }

/* ── Item de conversa ── */
.conv-item { display: flex; align-items: center; gap: 0.7rem; padding: 0.65rem 0.9rem; cursor: pointer; border-bottom: 1px solid #1a2329; transition: background 0.1s; position: relative; }
.conv-item:hover { background: #182229; }
.conv-item.active { background: #2a3942; }
.avatar { width: 44px; height: 44px; border-radius: 50%; background: #2a3942; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1rem; color: #8696a0; flex-shrink: 0; position: relative; }
.new-dot { position: absolute; top: 1px; right: 1px; width: 10px; height: 10px; background: #00a884; border-radius: 50%; border: 2px solid #111b21; animation: pulse 1.4s ease-in-out infinite; }
@keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.35); opacity: 0.7; } }
.conv-info { flex: 1; min-width: 0; }
.conv-top { display: flex; justify-content: space-between; align-items: baseline; }
.conv-name { font-size: 0.9rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
.conv-time { font-size: 0.7rem; color: #8696a0; flex-shrink: 0; }
.conv-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 0.15rem; }
.conv-preview { font-size: 0.79rem; color: #8696a0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 230px; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.status-dot.novo,.status-dot.lead { background: #60a5fa; }
.status-dot.em_atendimento { background: #fbbf24; }
.status-dot.comprou { background: #4ade80; }
.status-dot.nao_comprou { background: #f87171; }

.empty-list { padding: 2rem 1rem; color: #5a6b73; text-align: center; font-size: 0.85rem; }

/* ── Chat area ── */
.chat-area { flex: 1; display: flex; flex-direction: column; background: #0b141a; position: relative; }
.chat-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: #5a6b73; font-size: 0.95rem; flex-direction: column; gap: 0.5rem; }

/* Header do chat */
.chat-header { background: #202c33; padding: 0.65rem 1rem; display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; border-bottom: 1px solid #222d34; flex-shrink: 0; }
.chat-header-left { display: flex; align-items: center; gap: 0.7rem; min-width: 0; }
.chat-header-name { font-size: 0.93rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
.chat-header-phone { font-size: 0.72rem; color: #8696a0; }
.chat-header-right { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }

.status-select { background: #2a3942; color: #e9edef; border: none; padding: 0.35rem 0.6rem; border-radius: 6px; font-size: 0.78rem; cursor: pointer; outline: none; }
.status-select option { background: #111b21; }

.btn-sale { background: #fbbf24; color: #000; border: none; padding: 0.35rem 0.7rem; border-radius: 6px; font-size: 0.78rem; font-weight: 700; cursor: pointer; white-space: nowrap; transition: opacity 0.15s; }
.btn-sale:hover { opacity: 0.85; }

/* Sale inline form */
.sale-bar { background: #1a2329; border-top: 1px solid #222d34; padding: 0.6rem 1rem; display: flex; align-items: center; gap: 0.6rem; flex-shrink: 0; }
.sale-bar input { flex: 1; background: #202c33; border: 1px solid #2a3942; color: #e9edef; padding: 0.45rem 0.75rem; border-radius: 7px; font-size: 0.88rem; outline: none; max-width: 180px; }
.sale-bar input:focus { border-color: #fbbf24; }
.sale-bar label { font-size: 0.8rem; color: #8696a0; white-space: nowrap; }
.btn-sale-confirm { background: #4ade80; color: #000; border: none; padding: 0.45rem 1rem; border-radius: 7px; font-weight: 700; font-size: 0.82rem; cursor: pointer; }
.btn-sale-confirm:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-sale-cancel { background: none; border: 1px solid #2a3942; color: #8696a0; padding: 0.45rem 0.7rem; border-radius: 7px; font-size: 0.82rem; cursor: pointer; }

/* Mensagens */
.messages { flex: 1; overflow-y: auto; padding: 1rem 4%; display: flex; flex-direction: column; gap: 0.3rem; }
.bubble { max-width: 65%; padding: 0.5rem 0.75rem; border-radius: 8px; font-size: 0.87rem; line-height: 1.38; word-wrap: break-word; }
.bubble.in { align-self: flex-start; background: #202c33; border-top-left-radius: 2px; }
.bubble.out { align-self: flex-end; background: #005c4b; border-top-right-radius: 2px; }
.bubble .time { display: block; text-align: right; font-size: 0.63rem; color: #8696a0; margin-top: 0.25rem; }

/* Composer */
.composer { background: #202c33; padding: 0.6rem 0.9rem; display: flex; gap: 0.6rem; align-items: center; flex-shrink: 0; position: relative; }
.composer input { flex: 1; background: #2a3942; border: none; color: #e9edef; padding: 0.6rem 1rem; border-radius: 8px; font-size: 0.88rem; outline: none; }
.composer input::placeholder { color: #8696a0; }
.btn-quick { background: #2a3942; border: none; width: 38px; height: 38px; border-radius: 50%; color: #e9edef; font-size: 1rem; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
.btn-quick:hover { background: #374951; }
.btn-send { background: #00a884; border: none; width: 40px; height: 40px; border-radius: 50%; color: #0b141a; font-size: 1.1rem; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.btn-send:disabled { opacity: 0.45; cursor: not-allowed; }

/* Quick replies menu */
.quick-menu { position: absolute; bottom: 62px; left: 0; right: 0; background: #1f2c34; border-top: 1px solid #2a3942; border-radius: 10px 10px 0 0; max-height: 260px; overflow-y: auto; z-index: 20; box-shadow: 0 -4px 16px rgba(0,0,0,0.4); }
.quick-menu.hidden { display: none; }
.quick-menu-header { padding: 0.5rem 1rem; font-size: 0.72rem; color: #8696a0; border-bottom: 1px solid #2a3942; display: flex; justify-content: space-between; align-items: center; }
.quick-menu-header a { color: #00a884; font-size: 0.72rem; text-decoration: none; }
.quick-item { padding: 0.65rem 1rem; cursor: pointer; font-size: 0.87rem; border-bottom: 1px solid #1a2329; transition: background 0.1s; }
.quick-item:hover { background: #2a3942; }
.quick-item:last-child { border-bottom: none; }

/* Back button (mobile) */
.back-btn { display: none; background: none; border: none; color: #e9edef; font-size: 1.3rem; cursor: pointer; padding: 0 0.3rem; flex-shrink: 0; }

/* Notif toast */
.toast { position: fixed; top: 1rem; right: 1rem; background: #00a884; color: #000; padding: 0.65rem 1.1rem; border-radius: 8px; font-size: 0.85rem; font-weight: 600; z-index: 999; opacity: 0; transform: translateY(-10px); transition: all 0.25s; pointer-events: none; }
.toast.show { opacity: 1; transform: translateY(0); }

/* Mobile */
@media (max-width: 768px) {
  .sidebar { width: 100%; min-width: 0; }
  .chat-area { display: none; }
  .app.chat-open .sidebar { display: none; }
  .app.chat-open .chat-area { display: flex; }
  .back-btn { display: flex !important; }
  .bubble { max-width: 82%; }
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="app" id="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>💬 Atendimento</h1>
      <a href="/crm/config">⚙️ Respostas rápidas</a>
    </div>

    <div class="search-box">
      <input type="text" id="search" placeholder="Buscar conversa..." />
    </div>

    <!-- Filtros por status -->
    <div class="status-filters">
      <button class="sf-btn active" data-filter="todos">Todos<span class="sf-badge" id="cnt-todos">0</span></button>
      <button class="sf-btn" data-filter="novo,lead">Novos<span class="sf-badge" id="cnt-novo">0</span></button>
      <button class="sf-btn" data-filter="em_atendimento">Atendendo<span class="sf-badge" id="cnt-em">0</span></button>
      <button class="sf-btn" data-filter="comprou">Compraram<span class="sf-badge" id="cnt-comprou">0</span></button>
    </div>

    <div class="conv-list" id="conv-list">
      <div class="empty-list">Carregando...</div>
    </div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area" id="chat-area">
    <div class="chat-empty" id="chat-empty">
      <div style="font-size:2.5rem">💬</div>
      <div>Selecione uma conversa</div>
    </div>
  </div>

</div>

<script>
let conversations = [];
let currentPhone = null;
let currentLead  = null;
let currentFilter = 'todos';
let quickReplies  = [];
let lastMsgCount  = {};  // phone → count, para detectar novas mensagens
let saleBarOpen   = false;

// ── Utilitários ──────────────────────────────────────────────────────────────

const STATUS_LABELS = { novo:'Novo', lead:'Novo', em_atendimento:'Em atendimento', comprou:'Comprou', nao_comprou:'Não comprou' };

function initials(name, phone) {
  if (name) return name.trim().slice(0,2).toUpperCase();
  return phone.slice(-2);
}

function timeAgo(iso) {
  if (!iso) return '';
  const d = new Date(iso), now = new Date();
  if (d.toDateString() === now.toDateString())
    return d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
  return d.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'});
}

function escHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Conversas ────────────────────────────────────────────────────────────────

async function loadConversations(silent = false) {
  const res = await fetch('/api/conversations');
  const fresh = await res.json();

  // Detecta novas mensagens em conversas não abertas
  if (!silent) {
    fresh.forEach(c => {
      const prev = lastMsgCount[c.phone];
      const curr = c.lastMessage ? new Date(c.lastMessage.timestamp).getTime() : 0;
      if (prev !== undefined && curr > prev && c.phone !== currentPhone) {
        showToast(`💬 Nova mensagem de ${c.nome || c.phone}`);
        playBeep();
      }
      lastMsgCount[c.phone] = curr;
    });
  } else {
    // primeira carga: só inicializa o mapa sem notificar
    fresh.forEach(c => {
      lastMsgCount[c.phone] = c.lastMessage ? new Date(c.lastMessage.timestamp).getTime() : 0;
    });
  }

  conversations = fresh;
  updateCounts();
  renderConvList();
}

function updateCounts() {
  const q = (document.getElementById('search').value || '').toLowerCase();
  const all = conversations.filter(c =>
    (c.nome || '').toLowerCase().includes(q) || c.phone.includes(q));

  document.getElementById('cnt-todos').textContent   = all.length;
  document.getElementById('cnt-novo').textContent    = all.filter(c => c.status === 'novo' || c.status === 'lead').length;
  document.getElementById('cnt-em').textContent      = all.filter(c => c.status === 'em_atendimento').length;
  document.getElementById('cnt-comprou').textContent = all.filter(c => c.status === 'comprou').length;
}

function filterConv(list) {
  if (currentFilter === 'todos') return list;
  const vals = currentFilter.split(',');
  return list.filter(c => vals.includes(c.status));
}

function renderConvList() {
  const q = (document.getElementById('search').value || '').toLowerCase();
  const list = document.getElementById('conv-list');
  const filtered = filterConv(
    conversations.filter(c =>
      (c.nome || '').toLowerCase().includes(q) || c.phone.includes(q))
  );

  if (!filtered.length) {
    list.innerHTML = '<div class="empty-list">Nenhuma conversa</div>';
    return;
  }

  list.innerHTML = filtered.map(c => {
    const sk = c.status || 'novo';
    const preview = c.lastMessage
      ? (c.lastMessage.direction === 'out' ? 'Você: ' : '') + escHtml(c.lastMessage.body || '')
      : 'Sem mensagens';
    const active = c.phone === currentPhone ? 'active' : '';
    // ponto pulsando se tem mensagem nova e não é a conversa aberta
    const isNew = c.phone !== currentPhone && c.lastMessage?.direction === 'in'
      && c.status === 'novo';
    return `<div class="conv-item ${active}" onclick="openConversation('${c.phone}')">
      <div class="avatar">${initials(c.nome, c.phone)}${isNew ? '<div class="new-dot"></div>' : ''}</div>
      <div class="conv-info">
        <div class="conv-top">
          <span class="conv-name">${escHtml(c.nome || c.phone)}</span>
          <span class="conv-time">${timeAgo(c.last_message_at || c.created_at)}</span>
        </div>
        <div class="conv-bottom">
          <span class="conv-preview">${preview}</span>
          <span class="status-dot ${sk}"></span>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Chat ─────────────────────────────────────────────────────────────────────

async function openConversation(phone) {
  currentPhone = phone;
  currentLead  = conversations.find(c => c.phone === phone);
  saleBarOpen  = false;
  document.getElementById('app').classList.add('chat-open');
  renderConvList();
  await renderChatArea();
}

async function renderChatArea() {
  const chatArea = document.getElementById('chat-area');
  const sk = currentLead?.status || 'novo';

  chatArea.innerHTML = `
    <div class="chat-header">
      <div class="chat-header-left">
        <button class="back-btn" onclick="closeChat()">←</button>
        <div class="avatar">${initials(currentLead?.nome, currentPhone)}</div>
        <div>
          <div class="chat-header-name">${escHtml(currentLead?.nome || currentPhone)}</div>
          <div class="chat-header-phone">${currentPhone}</div>
        </div>
      </div>
      <div class="chat-header-right">
        <select class="status-select" id="status-select">
          <option value="novo" ${sk==='novo'||sk==='lead'?'selected':''}>Novo</option>
          <option value="em_atendimento" ${sk==='em_atendimento'?'selected':''}>Em atendimento</option>
          <option value="comprou" ${sk==='comprou'?'selected':''}>Comprou</option>
          <option value="nao_comprou" ${sk==='nao_comprou'?'selected':''}>Não comprou</option>
        </select>
        <button class="btn-sale" id="btn-sale" onclick="toggleSaleBar()">💰 Venda</button>
      </div>
    </div>

    <div id="sale-bar-slot"></div>

    <div class="messages" id="messages">
      <div class="empty-list">Carregando...</div>
    </div>

    <div class="quick-menu hidden" id="quick-menu">
      <div class="quick-menu-header">
        <span>⚡ Respostas rápidas</span>
        <a href="/crm/config" target="_blank">Editar</a>
      </div>
      <div id="quick-items"></div>
    </div>

    <div class="composer">
      <button class="btn-quick" id="btn-quick" title="Respostas rápidas">⚡</button>
      <input type="text" id="msg-input" placeholder="Digite uma mensagem..." />
      <button class="btn-send" id="send-btn">➤</button>
    </div>
  `;

  document.getElementById('status-select').onchange = async (e) => {
    await updateStatus(currentLead.id, e.target.value);
  };
  document.getElementById('send-btn').onclick = sendMessage;
  document.getElementById('msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) sendMessage();
  });
  document.getElementById('btn-quick').onclick = toggleQuickMenu;

  renderQuickItems();
  await loadMessages(true);
}

// ── Mensagens ─────────────────────────────────────────────────────────────────

let _msgPoll = null;

async function loadMessages(scrollForce = false) {
  if (!currentPhone) return;
  const res = await fetch(`/api/messages/${currentPhone}`);
  const msgs = await res.json();
  const container = document.getElementById('messages');
  if (!container) return;

  if (!msgs.length) {
    container.innerHTML = '<div class="empty-list">Nenhuma mensagem ainda</div>';
    return;
  }

  const wasBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 80;

  container.innerHTML = msgs.map(m => {
    const time = new Date(m.timestamp).toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
    return `<div class="bubble ${m.direction}">${escHtml(m.body||'')}<span class="time">${time}</span></div>`;
  }).join('');

  if (scrollForce || wasBottom) container.scrollTop = container.scrollHeight;
}

// ── Sale bar ─────────────────────────────────────────────────────────────────

function toggleSaleBar() {
  saleBarOpen = !saleBarOpen;
  const slot = document.getElementById('sale-bar-slot');
  if (!slot) return;

  if (saleBarOpen) {
    slot.innerHTML = `
      <div class="sale-bar" id="sale-bar">
        <label>💰 Valor da venda:</label>
        <input type="number" id="sale-value" placeholder="Ex: 297.00" step="0.01" min="0" />
        <button class="btn-sale-confirm" id="btn-sale-confirm" onclick="confirmSale()">Confirmar</button>
        <button class="btn-sale-cancel" onclick="toggleSaleBar()">✕</button>
      </div>`;
    setTimeout(() => document.getElementById('sale-value')?.focus(), 50);
    document.getElementById('sale-value')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') confirmSale();
    });
  } else {
    slot.innerHTML = '';
  }
}

async function confirmSale() {
  const val = parseFloat(document.getElementById('sale-value')?.value);
  if (!val || val <= 0) { alert('Informe um valor válido'); return; }

  const btn = document.getElementById('btn-sale-confirm');
  btn.disabled = true; btn.textContent = 'Enviando...';

  const res = await fetch(`/api/leads/${currentLead.id}/venda`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ valor: val }),
  });
  const data = await res.json();
  btn.disabled = false; btn.textContent = 'Confirmar';

  if (data.ok) {
    showToast('✅ Venda registrada' + (data.metaResult?.events_received ? ' + enviado ao Meta!' : ''));
    saleBarOpen = false;
    document.getElementById('sale-bar-slot').innerHTML = '';
    await loadConversations(false);
    currentLead = conversations.find(c => c.phone === currentPhone);
    // atualiza o status-select visualmente
    const sel = document.getElementById('status-select');
    if (sel) sel.value = 'comprou';
  } else {
    alert('Erro: ' + (data.error || 'desconhecido'));
  }
}

// ── Quick replies ─────────────────────────────────────────────────────────────

async function loadQuickReplies() {
  const res = await fetch('/api/quick-replies');
  quickReplies = await res.json();
}

function renderQuickItems() {
  const container = document.getElementById('quick-items');
  if (!container) return;
  if (!quickReplies.length) {
    container.innerHTML = '<div class="empty-list" style="padding:1rem">Nenhuma resposta rápida.<br><a href="/crm/config" style="color:#00a884">Adicionar</a></div>';
    return;
  }
  container.innerHTML = quickReplies.map(qr =>
    `<div class="quick-item" onclick="useQuickReply(${JSON.stringify(escHtml(qr.body))})">${escHtml(qr.body)}</div>`
  ).join('');
}

function toggleQuickMenu() {
  const menu = document.getElementById('quick-menu');
  if (!menu) return;
  menu.classList.toggle('hidden');
}

function useQuickReply(body) {
  // body já escapado — precisamos do texto puro
  const div = document.createElement('div');
  div.innerHTML = body;
  const plain = div.textContent;
  const input = document.getElementById('msg-input');
  if (input) input.value = plain;
  document.getElementById('quick-menu')?.classList.add('hidden');
  input?.focus();
}

// ── Status ───────────────────────────────────────────────────────────────────

async function updateStatus(leadId, status) {
  await fetch(`/api/leads/${leadId}/status`, {
    method: 'PATCH',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ status }),
  });
  await loadConversations(false);
  currentLead = conversations.find(c => c.phone === currentPhone);
}

// ── Send ─────────────────────────────────────────────────────────────────────

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const body  = input?.value.trim();
  if (!body || !currentPhone) return;

  const btn = document.getElementById('send-btn');
  btn.disabled = true; input.value = '';
  document.getElementById('quick-menu')?.classList.add('hidden');

  try {
    const res = await fetch(`/api/messages/${currentPhone}/send`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ body }),
    });
    const data = await res.json();
    if (!data.ok) { alert('Erro: ' + (data.error || 'desconhecido')); input.value = body; }
    else { await loadMessages(true); await loadConversations(false); }
  } catch { alert('Erro de conexão'); input.value = body; }
  finally { btn.disabled = false; input.focus(); }
}

// ── Mobile back ───────────────────────────────────────────────────────────────

function closeChat() {
  document.getElementById('app').classList.remove('chat-open');
  if (_msgPoll) { clearInterval(_msgPoll); _msgPoll = null; }
  currentPhone = null; currentLead = null;
}

// ── Beep simples ──────────────────────────────────────────────────────────────

let _ctx = null;
function playBeep() {
  try {
    if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = _ctx.createOscillator();
    const gain = _ctx.createGain();
    osc.connect(gain); gain.connect(_ctx.destination);
    osc.frequency.value = 880; osc.type = 'sine';
    gain.gain.setValueAtTime(0.12, _ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, _ctx.currentTime + 0.25);
    osc.start(); osc.stop(_ctx.currentTime + 0.25);
  } catch {}
}

// ── Filtros de status ────────────────────────────────────────────────────────

document.querySelectorAll('.sf-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sf-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderConvList();
  });
});

document.getElementById('search').addEventListener('input', () => {
  updateCounts(); renderConvList();
});

// ── Fecha quick menu ao clicar fora ──────────────────────────────────────────
document.addEventListener('click', e => {
  const menu = document.getElementById('quick-menu');
  const btn  = document.getElementById('btn-quick');
  if (menu && !menu.classList.contains('hidden') && !menu.contains(e.target) && e.target !== btn)
    menu.classList.add('hidden');
});

// ── Polling ───────────────────────────────────────────────────────────────────

async function tick() {
  await loadConversations(false);
  if (currentPhone) await loadMessages(false);
}

// Init
(async () => {
  await loadQuickReplies();
  await loadConversations(true);   // primeira carga: silent (sem notificar)
  setInterval(tick, 3000);          // polling a cada 3s
})();
</script>
