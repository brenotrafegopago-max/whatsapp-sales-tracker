<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CRM — WhatsApp</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0b141a;
    color: #e9edef;
    overflow: hidden;
  }

  .app {
    display: flex;
    height: 100vh;
  }

  /* ── Sidebar (lista de conversas) ── */
  .sidebar {
    width: 360px;
    min-width: 280px;
    background: #111b21;
    border-right: 1px solid #222d34;
    display: flex;
    flex-direction: column;
  }
  .sidebar-header {
    padding: 1rem;
    border-bottom: 1px solid #222d34;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .sidebar-header h1 { font-size: 1.05rem; font-weight: 600; }
  .search-box {
    padding: 0.6rem 0.8rem;
  }
  .search-box input {
    width: 100%;
    background: #202c33;
    border: none;
    color: #e9edef;
    padding: 0.5rem 0.9rem;
    border-radius: 8px;
    font-size: 0.85rem;
    outline: none;
  }
  .conv-list { flex: 1; overflow-y: auto; }
  .conv-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.7rem 1rem;
    cursor: pointer;
    border-bottom: 1px solid #1a2329;
    transition: background 0.1s;
  }
  .conv-item:hover { background: #182229; }
  .conv-item.active { background: #2a3942; }
  .avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: #2a3942;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 1.1rem;
    color: #8696a0;
    flex-shrink: 0;
  }
  .conv-info { flex: 1; min-width: 0; }
  .conv-top { display: flex; justify-content: space-between; align-items: baseline; }
  .conv-name { font-size: 0.92rem; font-weight: 500; }
  .conv-time { font-size: 0.72rem; color: #8696a0; }
  .conv-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 0.15rem; }
  .conv-preview {
    font-size: 0.8rem; color: #8696a0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 220px;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0;
  }
  .status-dot.novo { background: #60a5fa; }
  .status-dot.em_atendimento { background: #fbbf24; }
  .status-dot.comprou { background: #4ade80; }
  .status-dot.nao_comprou { background: #f87171; }
  .status-dot.lead { background: #60a5fa; }

  /* ── Área de chat ── */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #0b141a;
    background-image: radial-gradient(circle at 25% 25%, #0e1a21 0%, #0b141a 60%);
  }
  .chat-empty {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: #5a6b73; font-size: 0.95rem; text-align: center; flex-direction: column; gap: 0.5rem;
  }
  .chat-header {
    background: #202c33;
    padding: 0.7rem 1.2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    border-bottom: 1px solid #222d34;
  }
  .chat-header-left { display: flex; align-items: center; gap: 0.75rem; min-width: 0; }
  .chat-header-name { font-size: 0.95rem; font-weight: 600; }
  .chat-header-phone { font-size: 0.75rem; color: #8696a0; }

  .status-select {
    background: #2a3942;
    color: #e9edef;
    border: none;
    padding: 0.4rem 0.7rem;
    border-radius: 6px;
    font-size: 0.8rem;
    cursor: pointer;
    outline: none;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 1.2rem 4%;
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }
  .bubble {
    max-width: 65%;
    padding: 0.5rem 0.75rem;
    border-radius: 8px;
    font-size: 0.88rem;
    line-height: 1.35;
    position: relative;
    word-wrap: break-word;
  }
  .bubble.in { align-self: flex-start; background: #202c33; border-top-left-radius: 2px; }
  .bubble.out { align-self: flex-end; background: #005c4b; border-top-right-radius: 2px; }
  .bubble .time { display: block; text-align: right; font-size: 0.65rem; color: #8696a0; margin-top: 0.2rem; }

  .composer {
    background: #202c33;
    padding: 0.7rem 1rem;
    display: flex;
    gap: 0.7rem;
    align-items: center;
  }
  .composer input {
    flex: 1;
    background: #2a3942;
    border: none;
    color: #e9edef;
    padding: 0.65rem 1rem;
    border-radius: 8px;
    font-size: 0.9rem;
    outline: none;
  }
  .send-btn {
    background: #00a884;
    border: none;
    width: 40px; height: 40px;
    border-radius: 50%;
    color: #0b141a;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .empty-list { padding: 2rem 1rem; color: #5a6b73; text-align: center; font-size: 0.85rem; }

  /* ── Mobile ── */
  @media (max-width: 768px) {
    .sidebar { width: 100%; min-width: 0; }
    .chat-area { display: none; }
    .app.chat-open .sidebar { display: none; }
    .app.chat-open .chat-area { display: flex; }
    .back-btn { display: inline-flex !important; }
  }
  .back-btn {
    display: none;
    background: none; border: none; color: #e9edef;
    font-size: 1.3rem; cursor: pointer; padding: 0 0.3rem;
  }
</style>
</head>
<body>

<div class="app" id="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>💬 CRM — Atendimento</h1>
    </div>
    <div class="search-box">
      <input type="text" id="search" placeholder="Buscar conversa..." />
    </div>
    <div class="conv-list" id="conv-list">
      <div class="empty-list">Carregando...</div>
    </div>
  </div>

  <div class="chat-area" id="chat-area">
    <div class="chat-empty" id="chat-empty">
      <div style="font-size:2.5rem">💬</div>
      <div>Selecione uma conversa para começar</div>
    </div>
  </div>
</div>

<script>
let conversations = [];
let currentPhone = null;
let currentLead = null;
let pollInterval = null;

const STATUS_LABELS = {
  novo: 'Novo',
  lead: 'Novo',
  em_atendimento: 'Em atendimento',
  comprou: 'Comprou',
  nao_comprou: 'Não comprou',
};

function initials(name, phone) {
  if (name) return name.trim().slice(0, 2).toUpperCase();
  return phone.slice(-2);
}

function timeAgo(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  if (sameDay) return d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
}

async function loadConversations() {
  const res = await fetch('/api/conversations');
  conversations = await res.json();
  renderConvList();
}

function renderConvList(filter = '') {
  const list = document.getElementById('conv-list');
  const filtered = conversations.filter(c => {
    const q = filter.toLowerCase();
    return (c.nome || '').toLowerCase().includes(q) || c.phone.includes(q);
  });

  if (!filtered.length) {
    list.innerHTML = '<div class="empty-list">Nenhuma conversa encontrada</div>';
    return;
  }

  list.innerHTML = filtered.map(c => {
    const statusKey = c.status || 'novo';
    const preview = c.lastMessage
      ? (c.lastMessage.direction === 'out' ? 'Você: ' : '') + (c.lastMessage.body || '')
      : 'Sem mensagens';
    const active = c.phone === currentPhone ? 'active' : '';
    return `<div class="conv-item ${active}" onclick="openConversation('${c.phone}')">
      <div class="avatar">${initials(c.nome, c.phone)}</div>
      <div class="conv-info">
        <div class="conv-top">
          <span class="conv-name">${c.nome || c.phone}</span>
          <span class="conv-time">${timeAgo(c.last_message_at || c.created_at)}</span>
        </div>
        <div class="conv-bottom">
          <span class="conv-preview">${preview}</span>
          <span class="status-dot ${statusKey}" title="${STATUS_LABELS[statusKey] || statusKey}"></span>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function openConversation(phone) {
  currentPhone = phone;
  currentLead = conversations.find(c => c.phone === phone);
  document.getElementById('app').classList.add('chat-open');
  renderConvList(document.getElementById('search').value);
  await renderChatArea();
}

async function renderChatArea() {
  const chatArea = document.getElementById('chat-area');
  const statusKey = currentLead?.status || 'novo';

  chatArea.innerHTML = `
    <div class="chat-header">
      <div class="chat-header-left">
        <button class="back-btn" onclick="closeChat()">←</button>
        <div class="avatar">${initials(currentLead?.nome, currentPhone)}</div>
        <div>
          <div class="chat-header-name">${currentLead?.nome || currentPhone}</div>
          <div class="chat-header-phone">${currentPhone}</div>
        </div>
      </div>
      <select class="status-select" id="status-select">
        <option value="novo" ${statusKey === 'novo' || statusKey === 'lead' ? 'selected' : ''}>Novo</option>
        <option value="em_atendimento" ${statusKey === 'em_atendimento' ? 'selected' : ''}>Em atendimento</option>
        <option value="comprou" ${statusKey === 'comprou' ? 'selected' : ''}>Comprou</option>
        <option value="nao_comprou" ${statusKey === 'nao_comprou' ? 'selected' : ''}>Não comprou</option>
      </select>
    </div>
    <div class="messages" id="messages">
      <div class="empty-list">Carregando mensagens...</div>
    </div>
    <div class="composer">
      <input type="text" id="msg-input" placeholder="Digite uma mensagem..." />
      <button class="send-btn" id="send-btn">➤</button>
    </div>
  `;

  document.getElementById('status-select').onchange = async (e) => {
    await updateStatus(currentLead.id, e.target.value);
  };

  document.getElementById('send-btn').onclick = sendMessage;
  document.getElementById('msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendMessage();
  });

  await loadMessages();

  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(loadMessages, 5000);
}

async function loadMessages() {
  if (!currentPhone) return;
  const res = await fetch(`/api/messages/${currentPhone}`);
  const msgs = await res.json();
  const container = document.getElementById('messages');
  if (!container) return;

  if (!msgs.length) {
    container.innerHTML = '<div class="empty-list">Nenhuma mensagem ainda</div>';
    return;
  }

  const wasAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 60;

  container.innerHTML = msgs.map(m => {
    const time = new Date(m.timestamp).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    return `<div class="bubble ${m.direction}">
      ${escapeHtml(m.body || '')}
      <span class="time">${time}</span>
    </div>`;
  }).join('');

  if (wasAtBottom) container.scrollTop = container.scrollHeight;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const body = input.value.trim();
  if (!body || !currentPhone) return;

  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  input.value = '';

  try {
    const res = await fetch(`/api/messages/${currentPhone}/send`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ body }),
    });
    const data = await res.json();
    if (!data.ok) {
      alert('Erro ao enviar: ' + (data.error || 'desconhecido'));
      input.value = body;
    } else {
      await loadMessages();
      await loadConversations();
    }
  } catch (err) {
    alert('Erro de conexão');
    input.value = body;
  } finally {
    btn.disabled = false;
    input.focus();
  }
}

async function updateStatus(leadId, status) {
  await fetch(`/api/leads/${leadId}/status`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status }),
  });
  await loadConversations();
  currentLead = conversations.find(c => c.phone === currentPhone);
}

function closeChat() {
  document.getElementById('app').classList.remove('chat-open');
}

document.getElementById('search').addEventListener('input', e => {
  renderConvList(e.target.value);
});

loadConversations();
setInterval(loadConversations, 15000);
</script>
</body>
</html>
